name: CI/CD Pipeline
on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-Latest
    steps: 
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: "20"

      #Frontent
      - name: Install Frontend Dependancies
        run: cd devHub-web && npm install
      
      - name: Build Frontend
        run: cd devHub-web && npm run build
       
      #Backend
      - name: Install Backend Dependancies
        run: cd DevHub && npm install

      - name: Run Test
        run: cd DevHub && npm test
    
      #Docker
      - name: Login to Docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
    
      - name: Set up docker buildx
        used: docker/setup-buildx-action@v2

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./devHub-web
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devhubweb:${{ github.run_number }}
            ${{ secrets.DOCKER_USERNAME }}/devhubweb:latest 

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./DevHub
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/devhubbackend:${{ github.run_number }}
            ${{ secrets.DOCKER_USERNAME }}/devhubbackend:latest
      
    
      #Deploy
      - name: Deploy to EC2
        uses: aapleboy/ssh-action@v1
        with:
          host: ${{ EC2_HOST }}
          username: ${{ EC2_USER }}
          key: ${{ EC2_SSH_KEY }}
          script: |
            cd /path/to/your/app
            docker compose pull
            docker compose up -d
            docker image prune -f
